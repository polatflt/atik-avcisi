name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sistem bagimliklarini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            python3-pip \
            build-essential \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            libreadline-dev \
            libbz2-dev \
            zlib1g-dev \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libltdl-dev \
            libgdbm-dev

      - name: Buildozer kur
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Android SDK/NDK cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
          key: android-sdk-${{ hashFiles('buildozer.spec') }}
          restore-keys: android-sdk-

      - name: Dosya yapısını kontrol et
        run: ls -la

      - name: APK Derle
        run: buildozer -v android debug

      - name: APK'yi yukle
        uses: actions/upload-artifact@v4
        with:
          name: AtikAvcisi-APK
          path: bin/*.apk
