name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sistem bagimliklarini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            python3-pip \
            build-essential \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            libreadline-dev \
            libbz2-dev \
            zlib1g-dev \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libltdl-dev \
            libgdbm-dev \
            aidl

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android SDK paketlerini kur
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

      - name: Buildozer ve Cython kur
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: APK Derle
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          buildozer -v android debug 2>&1

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: AtikAvcisi-APK
          path: bin/*.apk
